<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MxdioWork's | Portfolio</title>
    <!-- Font più cattivi e moderni -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-bg: #0a0a0a;
            --glass: rgba(0, 242, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* Background Grid Animato */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle, black, transparent 90%);
        }

        /* Navbar / Admin Icon */
        .admin-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 10px;
            border: 1px solid var(--neon-blue);
            border-radius: 5px;
            color: var(--neon-blue);
            transition: all 0.3s;
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 1px;
            z-index: 100;
        }

        .admin-trigger:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* Main Content */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 6rem;
            margin: 0;
            color: white;
            text-shadow: 0 0 15px var(--neon-blue);
            animation: fadeIn 1.5s ease-out;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
            max-width: 600px;
        }

        .skill-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            animation: slideUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .skill-card h3 { color: var(--neon-blue); margin: 0 0 10px 0; font-family: 'Bebas Neue'; font-size: 1.5rem; }

        /* Login Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #111;
            padding: 40px;
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        input {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: white;
            outline: none;
        }

        button {
            padding: 10px 30px;
            background: var(--neon-blue);
            border: none;
            font-family: 'Bebas Neue';
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="admin-trigger" onclick="toggleLogin()">ADMIN ACCESS</div>

    <div class="container">
        <h1>MXDIOWORK'S</h1>
        <div class="skills-grid">
            <div class="skill-card" style="animation-delay: 0.2s;">
                <h3>JAVA</h3>
                <p>Advanced Paper / Spigot / NMS</p>
            </div>
            <div class="skill-card" style="animation-delay: 0.4s;">
                <h3>KOTLIN</h3>
                <p>Low Level Proficiency</p>
            </div>
            <div class="skill-card" style="animation-delay: 0.6s;">
                <h3>HTTP</h3>
                <p>Advanced Networking</p>
            </div>
            <div class="skill-card" style="animation-delay: 0.8s;">
                <h3>DEVELOPER</h3>
                <p>Full-stack Mindset</p>
            </div>
        </div>
    </div>

    <!-- Modale Login -->
    <div class="overlay" id="loginOverlay">
        <div class="login-box">
            <h2 style="font-family: 'Bebas Neue'; color: var(--neon-blue);">RESTRICED AREA</h2>
            <input type="text" id="user" placeholder="USERNAME">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button onclick="checkLogin()">ENTER</button>
            <p id="error" style="color: red; font-size: 12px; display: none;">Access Denied</p>
        </div>
    </div>

    <script>
        function toggleLogin() {
            document.getElementById('loginOverlay').style.display = 'flex';
        }

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'Medioevo' && p === 'ddedem34') {
                alert('Accesso Eseguito! Benvenuto Medioevo.\n(Nota: GitHub Pages non permette salvataggi su DB, questa è una simulazione)');
                document.getElementById('loginOverlay').style.display = 'none';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
